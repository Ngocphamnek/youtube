kind = "web"
previewPath = "/"
title = "PheLa86 Game"
version = "1.0.0"
id = "artifacts/phela86"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18704

[services.development]
run = "pnpm --filter @workspace/phela86 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phela86", "run", "build" ]
publicDir = "artifacts/phela86/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18704"
BASE_PATH = "/"
